services:
  andrzej:
    # Built and pushed automatically by .github/workflows/docker-publish.yml on
    # every push to main. On the server, `docker compose pull` grabs it — no
    # git checkout or build toolchain needed there. `build: .` is kept so
    # `docker compose up --build` still works for local dev without the registry.
    image: ghcr.io/scplegion/andrzej-spiewacz:latest
    build: .
    container_name: andrzej-spiewacz
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./state:/app/state
      # No bin/ mount: go-librespot is already baked into the image at build
      # time (see Dockerfile). Mounting a host ./bin here would shadow it with
      # an empty directory unless you'd separately run
      # `npm run install:librespot` on the host, defeating the point of Docker.

    ports:
      - "8077:8077"
      # Link portal — point your reverse proxy (e.g. spiewacz.scplegion.ovh) at
      # this port; it's what /link sends users to instead of /code.
      - "8078:8078"
      # go-librespot's OAuth callback ports (38080+, one per linked user) are
      # loopback-only — the bot process calls its own child daemons on them
      # from inside the container, so they never need to be published here.